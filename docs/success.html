<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to PrePrompt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f7f3ee;
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: #2a2520;
    }
    .container { max-width: 600px; width: 100%; }
    .check { font-size: 3rem; color: #c49a3c; margin-bottom: 1.5rem; }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.1; }
    .sub { color: #6b6560; margin-bottom: 0.5rem; font-size: 0.95rem; }
    .sub-email { color: #6b6560; margin-bottom: 2rem; font-size: 0.9rem; }
    .card {
      border: 1px solid #ddd8d0;
      padding: 1.5rem;
      margin-bottom: 1rem;
      border-radius: 2px;
    }
    .card h3 {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b6560;
      margin-bottom: 1rem;
    }
    .code-block {
      background: #2a2520;
      color: #f7f3ee;
      padding: 0.75rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      border-radius: 2px;
      margin-bottom: 0.5rem;
    }
    .card a { color: #c49a3c; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
    .card a:hover { text-decoration: underline; }
    .back {
      display: inline-block;
      margin-top: 2rem;
      color: #6b6560;
      text-decoration: none;
      font-size: 0.85rem;
      border-bottom: 1px solid #ddd8d0;
      padding-bottom: 1px;
    }
    .loading { color: #6b6560; font-size: 0.9rem; }
    .error-state { font-size: 0.9rem; }
    .error-state a { color: #c49a3c; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" class="loading">Verifying your subscription…</div>
    <div id="success" style="display:none">
      <div class="check">✓</div>
      <h1>You're in.</h1>
      <p class="sub" id="welcome-text">Welcome to PrePrompt.</p>
      <p class="sub-email" id="email-text"></p>
      <div class="card">
        <h3>Get started now</h3>
        <div class="code-block">$ pip install preprompt</div>
        <div class="code-block">$ preprompt-install</div>
      </div>
      <div class="card">
        <h3>Your account</h3>
        <p style="color:#6b6560;font-size:0.9rem;margin-bottom:0.75rem">
          Manage your subscription at preprompt.org
        </p>
        <a href="https://preprompt.org">preprompt.org →</a>
      </div>
      <a href="https://preprompt.org" class="back">← Back to preprompt.org</a>
    </div>
    <div id="error" style="display:none" class="error-state">
      <p>Something went wrong verifying your payment.</p>
      <p style="margin-top:1rem"><a href="https://preprompt.org">← Return to preprompt.org</a></p>
    </div>
  </div>
  <script>
    const API = 'https://preprompt-production-df10.up.railway.app';
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');

    if (!sessionId) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    } else {
      fetch(`${API}/api/verify-session?session_id=${encodeURIComponent(sessionId)}`)
        .then(r => r.json())
        .then(data => {
          document.getElementById('loading').style.display = 'none';
          if (data.success) {
            const planName = data.plan === 'pro' ? 'Pro' : 'Solo';
            document.getElementById('welcome-text').textContent =
              `Welcome to PrePrompt ${planName}.`;
            if (data.email) {
              document.getElementById('email-text').textContent =
                `Check ${data.email} for your welcome email.`;
            }
            document.getElementById('success').style.display = 'block';
          } else {
            document.getElementById('error').style.display = 'block';
          }
        })
        .catch(() => {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').style.display = 'block';
        });
    }
  </script>
</body>
</html>
