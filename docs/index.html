<!doctype html>
<html lang="en" class="theme-paper accent-amber density-comfy">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>preprompt — your prompts, battle-tested</title>
  <meta name="description" content="MCP server that intercepts and optimizes prompts in Claude Code and Cursor before they reach the LLM. Zero noise, sub-ms latency, runs locally." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
/* Preprompt landing — styles
 * warm-neutral paper, ink ~0.18, single ochre accent.
 * Mono-first: JetBrains Mono for display+UI; Inter Tight for body.
 */

:root {
  --bg:        oklch(0.975 0.006 85);
  --bg-2:      oklch(0.955 0.008 82);
  --ink:       oklch(0.205 0.012 60);
  --ink-2:     oklch(0.40 0.012 60);
  --ink-3:     oklch(0.58 0.010 60);
  --rule:      oklch(0.86 0.008 75);
  --rule-soft: oklch(0.92 0.006 75);
  --accent:    oklch(0.72 0.125 75);
  --accent-ink: oklch(0.28 0.09 65);
  --pos:       oklch(0.55 0.12 145);
  --neg:       oklch(0.52 0.10 30);

  --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  --sans: 'Inter Tight', ui-sans-serif, system-ui, sans-serif;

  --radius: 4px;
  --maxw: 1200px;
  --pad-y: 120px;
  --shell-x: 40px;
}

.theme-ink {
  --bg:        oklch(0.16 0.012 60);
  --bg-2:      oklch(0.20 0.013 60);
  --ink:       oklch(0.96 0.006 85);
  --ink-2:     oklch(0.78 0.010 80);
  --ink-3:     oklch(0.58 0.010 75);
  --rule:      oklch(0.30 0.013 60);
  --rule-soft: oklch(0.24 0.012 60);
  --accent:    oklch(0.80 0.14 75);
  --accent-ink: oklch(0.92 0.11 75);
}

.accent-amber    { --accent: oklch(0.74 0.125 75);  --accent-ink: oklch(0.30 0.09 65); }
.accent-electric { --accent: oklch(0.68 0.17 250);  --accent-ink: oklch(0.30 0.12 250); }
.accent-mute     { --accent: oklch(0.55 0.04 260);  --accent-ink: oklch(0.30 0.02 260); }
.theme-ink.accent-amber    { --accent-ink: oklch(0.92 0.11 75); }
.theme-ink.accent-electric { --accent-ink: oklch(0.86 0.12 250); }
.theme-ink.accent-mute     { --accent-ink: oklch(0.82 0.03 260); }

.density-comfy   { --pad-y: 120px; }
.density-compact { --pad-y: 80px; }

.type-mono-only body,
.type-mono-only p,
.type-mono-only h1,
.type-mono-only h2,
.type-mono-only h3 { font-family: var(--mono) !important; }

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-feature-settings: "ss01", "cv11", "tnum";
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  max-width: 100vw;
  text-rendering: optimizeLegibility;
}

a { color: inherit; text-decoration: none; }
code { font-family: var(--mono); font-size: 0.92em; }
em { font-style: normal; color: var(--accent-ink); background: color-mix(in oklch, var(--accent) 20%, transparent); padding: 0 3px; border-radius: 2px; }

.shell { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--shell-x); }

body::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  background-image: radial-gradient(circle at 1px 1px, var(--ink) 0.6px, transparent 0.6px);
  background-size: 3px 3px;
  opacity: 0.025;
  z-index: 100;
  mix-blend-mode: multiply;
}

/* ───────── NAV ───────── */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 24px var(--shell-x);
  max-width: var(--maxw);
  margin: 0 auto;
  border-bottom: 1px solid var(--rule-soft);
  flex-wrap: wrap;
}
.nav-links {
  display: flex; gap: 28px; align-items: center;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink-2);
}
.nav-links a { transition: color 120ms; }
.nav-links a:hover { color: var(--ink); }
.nav-gh {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  color: var(--ink);
}
.nav-gh-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 25%, transparent);
}

/* ───────── HERO ───────── */
.hero {
  padding: clamp(48px, 8vw, 96px) var(--shell-x) clamp(48px, 7vw, 80px);
  max-width: var(--maxw);
  margin: 0 auto;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  gap: 72px;
  align-items: start;
}
.eyebrow {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-3);
  display: inline-flex; align-items: center; gap: 10px;
  letter-spacing: 0.02em;
}
.eyebrow .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 20%, transparent);
}
.hero-title {
  font-family: var(--mono);
  font-weight: 600;
  font-size: clamp(40px, 5.2vw, 72px);
  line-height: 1.02;
  letter-spacing: -0.035em;
  margin: 22px 0 24px;
  color: var(--ink);
  text-wrap: pretty;
}
.hero-title-accent {
  background: linear-gradient(to right,
    color-mix(in oklch, var(--accent) 25%, transparent),
    color-mix(in oklch, var(--accent) 25%, transparent));
  background-repeat: no-repeat;
  background-size: 100% 38%;
  background-position: 0 88%;
  padding: 0 4px;
}
.hero-sub {
  font-family: var(--sans);
  font-size: 18px;
  line-height: 1.55;
  color: var(--ink-2);
  max-width: 54ch;
  margin: 0 0 36px;
  text-wrap: pretty;
}

.hero-ctas { display: flex; align-items: center; gap: 20px; margin-bottom: 48px; flex-wrap: wrap; }
.hero-docs {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink);
  padding: 12px 4px;
  border-bottom: 1px solid var(--ink);
  transition: gap 180ms;
}
.hero-docs:hover { gap: 14px; }
.hero-docs .arrow { color: var(--accent-ink); }

.hero-meta {
  display: grid;
  grid-template-columns: repeat(4, auto);
  gap: 40px;
  border-top: 1px solid var(--rule-soft);
  padding-top: 24px;
  font-family: var(--mono);
}
.hero-meta > div { display: flex; flex-direction: column; gap: 6px; }
.hero-meta-k {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
}
.hero-meta-v { font-size: 14px; color: var(--ink); }

/* copy-row */
.copy-row {
  all: unset;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 12px;
  padding: 13px 16px 13px 14px;
  background: var(--bg-2);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink);
  transition: border-color 120ms, background 120ms;
  max-width: 100%;
}
.copy-row:hover { border-color: var(--ink-3); }
.copy-prefix { color: var(--accent-ink); user-select: none; }
.copy-cmd { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.copy-hint {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  padding: 3px 8px;
  border: 1px solid var(--rule);
  border-radius: 3px;
}

/* ascii annotation */
.ascii-wrap {
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  background: var(--bg-2);
  overflow: hidden;
  box-shadow: 0 1px 0 var(--rule-soft), 0 30px 60px -40px color-mix(in oklch, var(--ink) 40%, transparent);
}
.ascii-chrome {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--rule);
  background: var(--bg);
}
.cd { width: 10px; height: 10px; border-radius: 50%; background: var(--rule); display: inline-block; }
.ascii-chrome .cd:first-child { background: color-mix(in oklch, var(--accent) 60%, var(--rule)); }
.ascii-chrome-title {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-3);
}
.ascii-box {
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.55;
  color: var(--ink-2);
  margin: 0;
  padding: 22px 24px;
  white-space: pre;
  overflow-x: auto;
}
.ansi-yellow { color: var(--accent-ink); font-weight: 600; }
.ansi-dim    { color: var(--ink-3); }

/* ───────── SECTION HEADER ───────── */
section { padding: var(--pad-y) var(--shell-x); max-width: var(--maxw); margin: 0 auto; }
.sh { margin-bottom: 56px; max-width: 780px; }
.sh-kicker {
  font-family: var(--mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent-ink);
  margin-bottom: 20px;
}
.sh-title {
  font-family: var(--mono);
  font-weight: 600;
  font-size: clamp(28px, 3vw, 40px);
  line-height: 1.1;
  letter-spacing: -0.025em;
  margin: 0 0 16px;
  color: var(--ink);
  text-wrap: balance;
}
.sh-sub {
  font-family: var(--sans);
  font-size: 17px;
  line-height: 1.55;
  color: var(--ink-2);
  margin: 0;
  max-width: 62ch;
}

/* ───────── BEFORE/AFTER ───────── */
.ba-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 32px;
}
.ba-chip {
  all: unset;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-2);
  transition: all 120ms;
}
.ba-chip:hover { border-color: var(--ink-3); color: var(--ink); }
.ba-chip.on {
  background: var(--bg-2);
  border-color: var(--ink);
  color: var(--ink);
}
.ba-chip-num { color: var(--ink-3); }
.ba-chip-label { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ba-chip-score { font-weight: 600; }
.ba-chip-score.pos { color: var(--accent-ink); }
.ba-chip-score.neg { color: var(--ink-3); }

.ba-panes {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 0;
  align-items: stretch;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-2);
}
.ba-pane { padding: 28px 32px; display: flex; flex-direction: column; gap: 16px; }
.ba-pane + .ba-pane { border-left: 1px solid var(--rule); }
.ba-pane-head {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono);
}
.ba-pane-tag {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  padding: 4px 8px;
  border: 1px solid var(--rule);
  border-radius: 3px;
}
.ba-pane-tag.alt {
  color: var(--accent-ink);
  border-color: color-mix(in oklch, var(--accent) 40%, var(--rule));
  background: color-mix(in oklch, var(--accent) 10%, transparent);
}
.ba-pane-meta { font-size: 11px; color: var(--ink-3); text-transform: lowercase; letter-spacing: 0.04em; }
.ba-pane-text {
  font-family: var(--mono);
  font-size: 13.5px;
  line-height: 1.65;
  color: var(--ink);
  margin: 0;
  white-space: pre-wrap;
}
.ba-after-text { color: var(--ink); }
.ba-passthrough { color: var(--ink-2); }
.ba-passthrough-line { color: var(--ink-3); font-style: italic; }

.ba-arrow {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 0 8px;
  border-left: 1px solid var(--rule);
  border-right: 1px solid var(--rule);
  background: var(--bg);
  min-width: 120px;
}
.ba-arrow-line {
  flex: 1;
  width: 1px;
  background: linear-gradient(to bottom, transparent, var(--rule) 40%, var(--rule) 60%, transparent);
}
.ba-arrow-badge {
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 10px;
  border: 1px solid var(--ink);
  background: var(--bg);
  font-family: var(--mono);
  border-radius: var(--radius);
  margin: 12px 0;
}
.ba-arrow-num { font-size: 22px; font-weight: 600; color: var(--accent-ink); letter-spacing: -0.02em; }
.ba-arrow-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  margin-top: 4px;
}

.ba-reason {
  margin-top: 16px;
  padding: 14px 18px;
  border: 1px dashed var(--rule);
  border-radius: var(--radius);
  display: flex; gap: 14px; align-items: center;
  font-family: var(--mono);
  font-size: 12px;
}
.ba-reason-k {
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.ba-reason-v { color: var(--ink); }

/* ───────── HOW ───────── */
.how-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-2);
}
.how-step {
  padding: 32px;
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  display: flex; flex-direction: column; gap: 16px;
}
.how-step:nth-child(2n) { border-right: none; }
.how-step:nth-last-child(-n+2) { border-bottom: none; }
.how-step-head { display: flex; align-items: baseline; gap: 14px; font-family: var(--mono); }
.how-step-n {
  font-size: 13px;
  color: var(--accent-ink);
  letter-spacing: 0.08em;
}
.how-step-t {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--ink);
}
.how-step-d {
  font-family: var(--sans);
  font-size: 15.5px;
  line-height: 1.55;
  color: var(--ink-2);
  margin: 0;
  max-width: 52ch;
}
.how-step-code {
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.6;
  color: var(--ink);
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin: 8px 0 0;
  white-space: pre-wrap;
}

/* ───────── CLASSIFIER ───────── */
.cls-table {
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  font-family: var(--mono);
  font-size: 13px;
  background: var(--bg-2);
}
.cls-row {
  display: grid;
  grid-template-columns: 90px 120px 1fr;
  gap: 24px;
  padding: 14px 22px;
  border-bottom: 1px solid var(--rule-soft);
  align-items: center;
}
.cls-row:last-of-type { border-bottom: none; }
.cls-row.cls-head {
  background: var(--bg);
  border-bottom: 1px solid var(--rule);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  padding: 12px 22px;
}
.cls-score { font-weight: 600; font-variant-numeric: tabular-nums; }
.cls-score.pos { color: var(--accent-ink); }
.cls-score.neg { color: var(--ink-3); }
.cls-hit { display: inline-flex; align-items: center; gap: 8px; color: var(--ink-2); }
.cls-hit-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--rule); border: 1px solid var(--ink-3);
}
.cls-hit-dot.on {
  background: var(--accent);
  border-color: var(--accent-ink);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 20%, transparent);
}
.cls-prompt { color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cls-foot {
  padding: 14px 22px;
  background: var(--bg);
  border-top: 1px solid var(--rule);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.04em;
}

/* ───────── MEMORY ───────── */
.mem-panes {
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  gap: 48px;
  align-items: start;
}
.mem-term {
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  background: var(--bg-2);
  overflow: hidden;
}
.mem-term-head {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--rule);
}
.mem-term-title {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-3);
}
.mem-term-body {
  padding: 20px 22px;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.75;
  color: var(--ink);
}
.mem-prompt { color: var(--ink-3); }
.mem-prompt::before { content: "❯ "; color: var(--accent-ink); }
.mem-prompt { color: var(--ink); }
.mem-title-label { color: var(--ink); font-weight: 600; }
.mem-rule { color: var(--rule); letter-spacing: -1px; }
.mem-row {
  position: relative;
  padding: 4px 0;
  display: grid;
  grid-template-columns: 100px 130px 1fr auto;
  gap: 8px;
  align-items: center;
  font-variant-numeric: tabular-nums;
}
.mem-k { color: var(--ink-3); }
.mem-v { color: var(--accent-ink); }
.mem-c { color: var(--ink-2); }
.mem-s { color: var(--ink-3); font-size: 11.5px; }
.mem-bar {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 1px;
  background: color-mix(in oklch, var(--accent) 50%, transparent);
}

.mem-copy h3 {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 24px;
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin: 0 0 16px;
  color: var(--ink);
}
.mem-copy p {
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.6;
  color: var(--ink-2);
  margin: 0 0 24px;
}
.mem-bullets { display: flex; flex-direction: column; gap: 10px; }
.mem-bullet {
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.5;
  color: var(--ink-2);
}
.mem-bullet > span:first-child {
  color: var(--accent-ink);
  margin-right: 8px;
  font-weight: 600;
}
.mem-bullet code {
  background: var(--bg-2);
  padding: 1px 5px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  color: var(--ink);
}

/* ───────── ARCHITECTURE ───────── */
.arch-box {
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.7;
  color: var(--ink);
  background: var(--bg-2);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 28px 32px;
  margin: 0;
  white-space: pre;
  overflow-x: auto;
}
.arch-note {
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink-2);
  margin: 20px 0 0;
  max-width: 66ch;
}

/* ───────── COST ───────── */
.cost { padding-top: 0; }
.cost-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-2);
}
.cost-item {
  padding: 40px 32px;
  border-right: 1px solid var(--rule);
  display: flex; flex-direction: column; gap: 8px;
}
.cost-item:last-child { border-right: none; }
.cost-item.cost-emph { background: var(--bg); }
.cost-k {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-3);
}
.cost-v {
  font-family: var(--mono);
  font-size: 40px;
  font-weight: 600;
  letter-spacing: -0.03em;
  color: var(--ink);
  line-height: 1;
  margin: 6px 0 10px;
}
.cost-emph .cost-v { color: var(--accent-ink); }
.cost-d {
  font-family: var(--sans);
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.5;
}

/* ───────── INSTALL ───────── */
.inst-card {
  padding: 36px;
  border: 1px solid var(--rule);

  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ── Logo ── */
    function LogoMark({ size = 28, stroke = 'currentColor', fill = 'currentColor', accent = null }) {
      return (
        <svg width={size} height={size} viewBox="0 0 32 32" fill="none"
             xmlns="http://www.w3.org/2000/svg"
             style={{ display: 'block', flexShrink: 0 }} aria-hidden="true">
          <rect x="3" y="6" width="7" height="7" fill={fill} />
          <rect x="3" y="19" width="7" height="7" fill={accent || fill} opacity={accent ? 1 : 0.55} />
          <path d="M15 9 L23 16 L15 23" stroke={stroke} strokeWidth="2.6"
                strokeLinecap="square" strokeLinejoin="miter" fill="none" />
        </svg>
      );
    }

    function Logo({ size = 28, showWord = true, accent = null, color = 'currentColor' }) {
      return (
        <span style={{
          display: 'inline-flex', alignItems: 'center', gap: 10, color,
          fontFamily: "'JetBrains Mono', ui-monospace, monospace",
          fontWeight: 600, fontSize: Math.round(size * 0.62),
          letterSpacing: '-0.01em', lineHeight: 1,
        }}>
          <LogoMark size={size} stroke={color} fill={color} accent={accent} />
          {showWord && <span>preprompt</span>}
        </span>
      );
    }

    /* ── Copy button ── */
    function CopyRow({ cmd, prefix = '$' }) {
      const [copied, setCopied] = useState(false);
      return (
        <button className="copy-row"
          onClick={() => {
            navigator.clipboard?.writeText(cmd);
            setCopied(true);
            setTimeout(() => setCopied(false), 1400);
          }}
          aria-label="copy command">
          <span className="copy-prefix">{prefix}</span>
          <span className="copy-cmd">{cmd}</span>
          <span className="copy-hint">{copied ? 'copied' : 'copy'}</span>
        </button>
      );
    }

    /* ── Section header ── */
    function SectionHeader({ kicker, title, sub }) {
      return (
        <div className="sh">
          <div className="sh-kicker">{kicker}</div>
          <h2 className="sh-title">{title}</h2>
          {sub && <p className="sh-sub">{sub}</p>}
        </div>
      );
    }

    /* ── Nav ── */
    function Nav() {
      return (
        <nav className="nav">
          <Logo size={26} />
          <div className="nav-links">
            <a href="#how">how it works</a>
            <a href="#classifier">classifier</a>
            <a href="#memory">memory</a>
            <a href="#install">install</a>
            <a href="https://preprompt.beehiiv.com/subscribe" target="_blank" rel="noreferrer" style={{color: "var(--accent-ink)", fontWeight: 600}}>join beta</a>
            <a href="https://github.com/yashdeeptehlan/preprompt" className="nav-gh">
              <span className="nav-gh-dot" /> github
            </a>
          </div>
        </nav>
      );
    }

    /* ── ASCII annotation ── */
    function AsciiAnnotation() {
      return (
        <div className="ascii-wrap">
          <div className="ascii-chrome">
            <span className="cd" /><span className="cd" /><span className="cd" />
            <span className="ascii-chrome-title">claude-code · stderr</span>
          </div>
          <pre className="ascii-box" aria-label="terminal annotation">{`╔═ preprompt  `}<span className="ansi-yellow">+58</span>{` ═══════════════════════════════════════════╗
║ The rewritten prompt specifies the technical              ║
║ implementation details, clarifies the workflow, and adds  ║
║ concrete error scenarios relevant to FastAPI apps.        ║
╠═══════════════════════════════════════════════════════════╣
║ `}<span className="ansi-dim">ORIGINAL</span>{`  write a function that handles youtube oauth t… ║
║ `}<span className="ansi-yellow">OPTIMIZED</span>{` Write a Python function for FastAPI that       ║
║           handles YouTube OAuth 2.0 token refresh. The    ║
║           function should: (1) detect expired credentials ║
║           by checking the expiry timestamp, (2) use the   ║
║           refresh token to obtain a new access token…     ║
╚═══════════════════════════════════════════════════════════╝`}</pre>
        </div>
      );
    }

    /* ── Hero ── */
    function Hero() {
      return (
        <header className="hero">
          <div className="hero-grid">
            <div className="hero-left">
              <div className="eyebrow">
                <span className="dot" /> MCP server · runs locally · v0.1.0
              </div>
              <h1 className="hero-title">
                Your prompts,<br />
                <span className="hero-title-accent">battle-tested</span> before
                the model sees them.
              </h1>
              <p className="hero-sub">
                Preprompt sits between your keyboard and the LLM. It scores every
                prompt with a heuristic classifier in under a millisecond, and
                quietly rewrites the complex ones with Haiku. Simple prompts pass
                through untouched. No noise, no latency, no API cost on the
                small stuff.
              </p>

              <div className="hero-ctas">
                <CopyRow cmd="pip install preprompt" />
                <a className="hero-docs" href="#how">
                  <span>read the docs</span>
                  <span className="arrow">→</span>
                </a>
              </div>

              <div className="hero-meta">
                <div><span className="hero-meta-k">latency</span><span className="hero-meta-v">&lt; 1ms</span></div>
                <div><span className="hero-meta-k">api cost</span><span className="hero-meta-v">~$0.60 / mo</span></div>
                <div><span className="hero-meta-k">deps</span><span className="hero-meta-v">sqlite, haiku</span></div>
                <div><span className="hero-meta-k">license</span><span className="hero-meta-v">MIT</span></div>
                <div><span className="hero-meta-k">requires</span><span className="hero-meta-v" style={{fontSize: "12px"}}>Anthropic API key</span></div>
              </div>
            </div>

            <div className="hero-right">
              <AsciiAnnotation />
            </div>
          </div>
        </header>
      );
    }

    /* ── Before / After ── */
    const EXAMPLES = [
      {
        before: "write a function that handles youtube oauth token refresh and manages expired credentials with error handling",
        after: "Write a Python function for FastAPI that handles YouTube OAuth 2.0 token refresh. The function should: (1) detect expired credentials by checking the expiry timestamp, (2) use the refresh token to obtain a new access token via the YouTube API, (3) persist the new credentials, and (4) include error handling for invalid refresh tokens, network failures, and API errors with appropriate logging.",
        score: 58,
        reason: "Ambiguous verbs · missing output format · multi-requirement density",
      },
      {
        before: "refactor this to handle edge cases and manage errors properly",
        after: "Refactor the selected code to handle the following edge cases: null/undefined inputs, empty collections, boundary values, and network timeouts. Wrap I/O in try/except with specific exception types. Log recoverable errors at WARNING, unrecoverable at ERROR. Preserve the existing public API; add tests for each edge case.",
        score: 65,
        reason: "Vague refactor · no scope boundary · no error taxonomy",
      },
      {
        before: "implement a rate limiter that tracks requests, manages quotas and handles bursts",
        after: "Implement a token-bucket rate limiter with: (1) per-key buckets stored in Redis, (2) configurable capacity + refill rate, (3) atomic check-and-decrement via Lua script to avoid races, (4) burst tolerance of 2× capacity for <5s windows, (5) 429 response with Retry-After header when exhausted, (6) metrics hook for rate and rejection count.",
        score: 70,
        reason: "Multi-requirement · infra unspecified · no response contract",
      },
      {
        before: "what is jwt",
        after: null,
        score: -35,
        reason: "Lookup question · short · passes through unchanged",
      },
    ];

    function BeforeAfter() {
      const [idx, setIdx] = useState(0);
      const ex = EXAMPLES[idx];
      const intercepted = ex.after != null;

      return (
        <section className="ba" id="transform">
          <SectionHeader
            kicker="02  the transform"
            title="Watch a vague prompt become a specification."
            sub="Real examples from the classifier. Scores under 38 pass through untouched — preprompt is quiet unless it has something to say."
          />

          <div className="ba-picker">
            {EXAMPLES.map((e, i) => (
              <button key={i} className={'ba-chip' + (i === idx ? ' on' : '')} onClick={() => setIdx(i)}>
                <span className="ba-chip-num">{String(i + 1).padStart(2, '0')}</span>
                <span className="ba-chip-label">{e.before.slice(0, 36)}…</span>
                <span className={'ba-chip-score ' + (e.score >= 38 ? 'pos' : 'neg')}>
                  {e.score > 0 ? '+' : ''}{e.score}
                </span>
              </button>
            ))}
          </div>

          <div className="ba-panes">
            <div className="ba-pane">
              <div className="ba-pane-head">
                <span className="ba-pane-tag">BEFORE</span>
                <span className="ba-pane-meta">typed by you</span>
              </div>
              <p className="ba-pane-text">{ex.before}</p>
            </div>

            <div className="ba-arrow" aria-hidden>
              <div className="ba-arrow-line" />
              <div className="ba-arrow-badge">
                <span className="ba-arrow-num">{ex.score > 0 ? '+' : ''}{ex.score}</span>
                <span className="ba-arrow-label">{intercepted ? 'intercept' : 'pass-through'}</span>
              </div>
              <div className="ba-arrow-line" />
            </div>

            <div className={'ba-pane ba-pane-after' + (intercepted ? ' intercepted' : ' passthrough')}>
              <div className="ba-pane-head">
                <span className="ba-pane-tag alt">{intercepted ? 'OPTIMIZED' : 'UNCHANGED'}</span>
                <span className="ba-pane-meta">{intercepted ? 'via haiku' : 'no api call'}</span>
              </div>
              {intercepted ? (
                <p className="ba-pane-text ba-after-text">{ex.after}</p>
              ) : (
                <p className="ba-pane-text ba-passthrough">
                  <span className="ba-passthrough-line">// prompt sent as-is — simple lookup, sub-ms classification.</span>
                  <br />{ex.before}
                </p>
              )}
            </div>
          </div>

          <div className="ba-reason">
            <span className="ba-reason-k">why</span>
            <span className="ba-reason-v">{ex.reason}</span>
          </div>
        </section>
      );
    }

    /* ── How it works ── */
    function HowItWorks() {
      const steps = [
        {
          n: '01', t: 'Intercept',
          d: 'A Claude Code UserPromptSubmit hook catches every prompt the moment you hit enter. No IDE plugin, no cloud round-trip — the hook is a local Python file resolved by absolute path.',
          code: `# .claude/hooks/pre_prompt.py\non UserPromptSubmit:\n  prompt = stdin.read()\n  score  = classify_prompt(prompt, …)`,
        },
        {
          n: '02', t: 'Classify',
          d: 'Pure heuristics — no API call. Ambiguity verbs, multi-requirement density, turn depth, missing-format signals. Threshold 38. Simple prompts, lookups, and short acks score low and skip.',
          code: `score = heuristic(prompt)\nif score < 38:\n    return prompt           # pass through`,
        },
        {
          n: '03', t: 'Optimize',
          d: 'Complex prompts are sent to claude-haiku-4-5 with your learned stack context injected. The rewrite is returned in under a second. Cost per intercept: ~$0.001.',
          code: `rewritten = haiku.rewrite(\n    prompt,\n    stack=load_memory(),\n)`,
        },
        {
          n: '04', t: 'Log & learn',
          d: 'The hook writes a JSON sidecar to ~/.preprompt/pending/. The MCP server flushes it into SQLite (WAL) on the next tool call, updating stack_memory with a compounding confidence score.',
          code: `# sidecar → SQLite WAL\nflush_pending_hook_events()\nupsert_stack_memory(key, value)`,
        },
      ];

      return (
        <section className="how" id="how">
          <SectionHeader
            kicker="03  how it works"
            title="Four quiet steps between your keyboard and the model."
          />
          <div className="how-grid">
            {steps.map((s) => (
              <div className="how-step" key={s.n}>
                <div className="how-step-head">
                  <span className="how-step-n">{s.n}</span>
                  <span className="how-step-t">{s.t}</span>
                </div>
                <p className="how-step-d">{s.d}</p>
                <pre className="how-step-code">{s.code}</pre>
              </div>
            ))}
          </div>
        </section>
      );
    }

    /* ── Classifier table ── */
    const CLASSIFIER_ROWS = [
      { score: 48,  hit: true,  prompt: "write me a middleware that validates tokens and handles refresh" },
      { score: -35, hit: false, prompt: "what is jwt" },
      { score: -45, hit: false, prompt: "thanks" },
      { score: 65,  hit: true,  prompt: "refactor this to handle edge cases and manage errors properly" },
      { score: -20, hit: false, prompt: "add tests" },
      { score: 70,  hit: true,  prompt: "implement a rate limiter that tracks requests, manages quotas, handles bursts" },
      { score: 41,  hit: true,  prompt: "build a cli that parses yaml configs and validates against a schema" },
      { score: -12, hit: false, prompt: "format this file" },
    ];

    function ClassifierTable() {
      return (
        <section className="cls" id="classifier">
          <SectionHeader
            kicker="04  the classifier"
            title="Zero API calls. Sub-millisecond. Transparent."
            sub="The scorer runs on every prompt in under 1ms. It's a small, tuned heuristic you can read in 60 lines — not a neural classifier, not a cloud call."
          />
          <div className="cls-table" role="table">
            <div className="cls-row cls-head" role="row">
              <span>score</span>
              <span>intercept</span>
              <span>prompt</span>
            </div>
            {CLASSIFIER_ROWS.map((r, i) => (
              <div className="cls-row" role="row" key={i}>
                <span className={'cls-score ' + (r.hit ? 'pos' : 'neg')}>
                  {r.score > 0 ? '+' : ''}{r.score}
                </span>
                <span className="cls-hit">
                  {r.hit
                    ? <><span className="cls-hit-dot on" /> yes</>
                    : <><span className="cls-hit-dot" /> no</>}
                </span>
                <span className="cls-prompt">{r.prompt}</span>
              </div>
            ))}
            <div className="cls-foot">
              threshold = 38 · multi-requirement weight = 12/hit · negative signals subtract
            </div>
          </div>
        </section>
      );
    }

    /* ── Stack memory ── */
    function StackMemory() {
      const rows = [
        { k: 'language',  v: 'python',     c: 0.92, seen: 47 },
        { k: 'framework', v: 'fastapi',    c: 0.88, seen: 31 },
        { k: 'database',  v: 'postgresql', c: 0.74, seen: 12 },
        { k: 'testing',   v: 'pytest',     c: 0.61, seen: 9  },
        { k: 'style',     v: 'type-hints', c: 0.44, seen: 6  },
      ];

      return (
        <section className="mem" id="memory">
          <SectionHeader
            kicker="05  stack memory"
            title="It learns your stack as you work."
            sub="After a few sessions preprompt knows your language, framework, and style preferences — and injects them into every optimization automatically."
          />
          <div className="mem-panes">
            <div className="mem-term">
              <div className="mem-term-head">
                <span className="cd" /><span className="cd" /><span className="cd" />
                <span className="mem-term-title">~ preprompt-memory</span>
              </div>
              <div className="mem-term-body">
                <div className="mem-prompt">preprompt-memory</div>
                <div className="mem-title">
                  <span className="mem-title-label"> preprompt — learned stack</span>
                </div>
                <div className="mem-rule">──────────────────────────────────────────────────────</div>
                {rows.map((r) => (
                  <div className="mem-row" key={r.k}>
                    <span className="mem-k">{r.k}</span>
                    <span className="mem-v">{r.v}</span>
                    <span className="mem-c">confidence: {r.c.toFixed(2)}</span>
                    <span className="mem-s">(seen {r.seen}×)</span>
                    <div className="mem-bar" style={{ width: `${r.c * 100}%` }} />
                  </div>
                ))}
              </div>
            </div>

            <div className="mem-copy">
              <h3>Compounding confidence, not one-shot guesses.</h3>
              <p>
                Every prompt passes through a stack signal extractor that watches
                for language markers, framework idioms, and tooling references.
                Matches <em>add</em> to confidence (+0.02 per hit); contradictory
                values <em>reset</em>. By week two, every rewrite speaks your
                stack's dialect.
              </p>
              <div className="mem-bullets">
                <div className="mem-bullet"><span>›</span> Consolidates across sessions — one memory, not per-repo.</div>
                <div className="mem-bullet"><span>›</span> Inspect, edit, or clear via <code>preprompt-memory</code>.</div>
                <div className="mem-bullet"><span>›</span> Never leaves your machine. SQLite, local, WAL mode.</div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ── Architecture ── */
    function Architecture() {
      return (
        <section className="arch">
          <SectionHeader
            kicker="06  architecture"
            title="A hook, a sidecar, and an MCP server. That's it."
          />
          <pre className="arch-box">{`Claude Code / Cursor
        │
        ▼  UserPromptSubmit hook
  pre_prompt.py
  ├── classify_prompt()     ← pure heuristic, <1ms, no API
  ├── [score < 38] ──────▶  pass through unchanged
  └── [score ≥ 38]
      ├── optimize()        ← haiku call + stack context
      ├── write sidecar     ← ~/.preprompt/pending/<uuid>.json
      └── return optimized prompt
        │
        ▼  MCP server (on next tool call)
  flush_pending_hook_events()  ← sidecars → SQLite
  save_prompt_event()
  update_memory_from_prompt()`}</pre>
          <p className="arch-note">
            The hook never holds a database connection. It writes a small JSON
            sidecar so there's no lock conflict with the MCP server — a tiny
            concurrency pattern that pays off the first time you run two Claude
            Code sessions in parallel.
          </p>
        </section>
      );
    }

    /* ── Cost ── */
    function Cost() {
      return (
        <section className="cost">
          <div className="cost-grid">
            <div className="cost-item">
              <div className="cost-k">simple prompts</div>
              <div className="cost-v">$0.00</div>
              <div className="cost-d">never hit the API. classifier is pure python.</div>
            </div>
            <div className="cost-item cost-emph">
              <div className="cost-k">per intercept</div>
              <div className="cost-v">~$0.001</div>
              <div className="cost-d">haiku-4-5, typical rewrite 300–600 tokens. Uses your Anthropic API key — separate from Claude.ai subscription. New accounts get $5 free.</div>
            </div>
            <div className="cost-item">
              <div className="cost-k">20 complex / day</div>
              <div className="cost-v">~$0.60/mo</div>
              <div className="cost-d">heavy-use dev, one month. that's it.</div>
            </div>
          </div>
        </section>
      );
    }

    /* ── Install ── */
    function Install() {
      return (
        <section className="inst" id="install">
          <SectionHeader
            kicker="07  install"
            title="One command. Five seconds. No signup."
          />
          <div className="inst-card">
            <div className="inst-step" style={{marginBottom: "4px"}}>
              <span className="inst-n" style={{opacity: 0.5}}>00</span>
              <span className="inst-l">prerequisites</span>
            </div>
            <div style={{padding: "12px 0 20px 0", borderBottom: "1px solid var(--rule)", marginBottom: "20px"}}>
              <div style={{display: "flex", flexDirection: "column", gap: "8px", fontFamily: "var(--mono)", fontSize: "13px"}}>
                <div style={{display: "flex", gap: "10px", alignItems: "center"}}>
                  <span style={{color: "#4ade80"}}>✓</span>
                  <span>Python 3.11+</span>
                </div>
                <div style={{display: "flex", gap: "10px", alignItems: "center"}}>
                  <span style={{color: "#4ade80"}}>✓</span>
                  <span>Claude Code and/or Cursor installed</span>
                </div>
                <div style={{display: "flex", gap: "10px", alignItems: "flex-start"}}>
                  <span style={{color: "var(--accent-ink)", flexShrink: 0}}>→</span>
                  <span>Anthropic API key — <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{color: "var(--accent-ink)", textDecoration: "underline"}}>get $5 free at console.anthropic.com</a> <span style={{opacity: 0.55}}>(separate from Claude.ai subscription)</span></span>
                </div>
              </div>
            </div>

            <div className="inst-step">
              <span className="inst-n">01</span>
              <span className="inst-l">install via pip</span>
            </div>
            <CopyRow cmd="pip install preprompt" />

            <div className="inst-step">
              <span className="inst-n">02</span>
              <span className="inst-l">register with your IDE</span>
            </div>
            <CopyRow cmd="python scripts/setup_global_hook.py    # claude code" />
            <CopyRow cmd="python scripts/install_cursor.py       # cursor" />
            <CopyRow cmd="python scripts/install_windsurf.py     # windsurf" />

            <div className="inst-foot">
              Requires <code>ANTHROPIC_API_KEY</code> in <code>.env</code> · python 3.11+ · macos &amp; linux
              <br />Or from source: <code>git clone github.com/yashdeeptehlan/preprompt &amp;&amp; ./scripts/install.sh</code>
            </div>
          </div>
        </section>
      );
    }

    /* ── Beta signup ── */
    function Beta() {
      return (
        <section id="beta" style={{
          background: "linear-gradient(135deg, oklch(0.35 0.12 295) 0%, oklch(0.25 0.14 310) 100%)",
          padding: "72px var(--shell-x)",
          textAlign: "center",
        }}>
          <div style={{maxWidth: "600px", margin: "0 auto"}}>
            <div style={{fontFamily: "var(--mono)", fontSize: "11px", letterSpacing: "0.12em", textTransform: "uppercase", color: "rgba(255,255,255,0.5)", marginBottom: "16px"}}>
              early access
            </div>
            <h2 style={{fontFamily: "var(--mono)", fontSize: "clamp(24px,4vw,36px)", fontWeight: 700, color: "#fff", marginBottom: "12px", lineHeight: 1.2}}>
              Get updates as PrePrompt evolves
            </h2>
            <p style={{color: "rgba(255,255,255,0.6)", fontSize: "15px", marginBottom: "32px", fontFamily: "var(--sans)"}}>
              New releases, tips, and what's coming next. No noise.
            </p>
            <div style={{display: "flex", flexDirection: "column", gap: "12px", maxWidth: "440px", margin: "0 auto", position: "relative", zIndex: 10}}>
              <div style={{display: "flex", gap: "10px", flexWrap: "wrap", justifyContent: "center"}}>
                <input
                  id="email-input"
                  type="email"
                  placeholder="Enter your email"
                  style={{
                    flex: "1 1 200px", minWidth: "180px",
                    background: "rgba(255,255,255,0.1)",
                    border: "1px solid rgba(255,255,255,0.2)",
                    borderRadius: "10px",
                    padding: "12px 18px",
                    color: "#fff",
                    fontFamily: "var(--mono)",
                    fontSize: "13px",
                    outline: "none",
                  }}
                />
                <a
                  id="beta-join-btn"
                  href="https://preprompt.beehiiv.com/subscribe"
                  target="_blank"
                  rel="noreferrer"
                  onClick={() => appendEmail()}
                  style={{
                    background: "#fff",
                    color: "oklch(0.35 0.12 295)",
                    padding: "12px 24px",
                    borderRadius: "10px",
                    fontFamily: "var(--mono)",
                    fontWeight: 700,
                    fontSize: "13px",
                    textDecoration: "none",
                    cursor: "pointer",
                    whiteSpace: "nowrap",
                  }}
                >
                  Join Beta
                </a>
              </div>
              <p style={{color: "rgba(200,180,255,0.5)", fontSize: "11px", fontFamily: "var(--mono)"}}>
                No spam. Unsubscribe anytime.
              </p>
            </div>
          </div>
        </section>
      );
    }


    /* ── Footer ── */
    function Footer() {
      return (
        <footer className="foot">
          <div className="foot-top">
            <Logo size={22} />
            <div className="foot-links">
              <a href="https://github.com/yashdeeptehlan/preprompt">github</a>
              <a href="#how">docs</a>
              <a href="#install">install</a>
              <a href="https://github.com/yashdeeptehlan/preprompt/blob/main/LICENSE">mit license</a>
            </div>
          </div>
          <div className="foot-rule" />
          <div className="foot-bot">
            <span>© 2026 preprompt · built for the seam between keyboard and model.</span>
            <span className="foot-v">v0.1.1 · phase 8c complete · 29/29 tests passing</span>
          </div>
        </footer>
      );
    }

    /* ── App ── */
    function App() {
      return (
        <>
          <Nav />
          <Hero />
          <BeforeAfter />
          <HowItWorks />
          <ClassifierTable />
          <StackMemory />
          <Architecture />
          <Cost />
          <Install />
          <Beta />
          <Footer />
        </>
      );
    }

    function appendEmail() {
      const email = document.getElementById('email-input')?.value?.trim();
      const btn = document.getElementById('beta-join-btn');
      if (email && btn) {
        btn.href = 'https://preprompt.beehiiv.com/subscribe?email=' + encodeURIComponent(email);
      }
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
