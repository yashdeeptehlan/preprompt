  <style>
/* Preprompt landing — styles
 * warm-neutral paper, ink ~0.18, single ochre accent.
 * Mono-first: JetBrains Mono for display+UI; Inter Tight for body.
 */

:root {
  --bg:        oklch(0.975 0.006 85);
  --bg-2:      oklch(0.955 0.008 82);
  --ink:       oklch(0.205 0.012 60);
  --ink-2:     oklch(0.40 0.012 60);
  --ink-3:     oklch(0.58 0.010 60);
  --rule:      oklch(0.86 0.008 75);
  --rule-soft: oklch(0.92 0.006 75);
  --accent:    oklch(0.72 0.125 75);
  --accent-ink: oklch(0.28 0.09 65);
  --pos:       oklch(0.55 0.12 145);
  --neg:       oklch(0.52 0.10 30);

  --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  --sans: 'Inter Tight', ui-sans-serif, system-ui, sans-serif;

  --radius: 4px;
  --maxw: 1200px;
  --pad-y: 120px;
  --shell-x: 40px;
}

.theme-ink {
  --bg:        oklch(0.16 0.012 60);
  --bg-2:      oklch(0.20 0.013 60);
  --ink:       oklch(0.96 0.006 85);
  --ink-2:     oklch(0.78 0.010 80);
  --ink-3:     oklch(0.58 0.010 75);
  --rule:      oklch(0.30 0.013 60);
  --rule-soft: oklch(0.24 0.012 60);
  --accent:    oklch(0.80 0.14 75);
  --accent-ink: oklch(0.92 0.11 75);
}

.accent-amber    { --accent: oklch(0.74 0.125 75);  --accent-ink: oklch(0.30 0.09 65); }
.accent-electric { --accent: oklch(0.68 0.17 250);  --accent-ink: oklch(0.30 0.12 250); }
.accent-mute     { --accent: oklch(0.55 0.04 260);  --accent-ink: oklch(0.30 0.02 260); }
.theme-ink.accent-amber    { --accent-ink: oklch(0.92 0.11 75); }
.theme-ink.accent-electric { --accent-ink: oklch(0.86 0.12 250); }
.theme-ink.accent-mute     { --accent-ink: oklch(0.82 0.03 260); }

.density-comfy   { --pad-y: 120px; }
.density-compact { --pad-y: 80px; }

.type-mono-only body,
.type-mono-only p,
.type-mono-only h1,
.type-mono-only h2,
.type-mono-only h3 { font-family: var(--mono) !important; }

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-feature-settings: "ss01", "cv11", "tnum";
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  max-width: 100vw;
  text-rendering: optimizeLegibility;
}

a { color: inherit; text-decoration: none; }
code { font-family: var(--mono); font-size: 0.92em; }
em { font-style: normal; color: var(--accent-ink); background: color-mix(in oklch, var(--accent) 20%, transparent); padding: 0 3px; border-radius: 2px; }

.shell { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--shell-x); }

body::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  background-image: radial-gradient(circle at 1px 1px, var(--ink) 0.6px, transparent 0.6px);
  background-size: 3px 3px;
  opacity: 0.025;
  z-index: 100;
  mix-blend-mode: multiply;
}

/* ───────── NAV ───────── */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 24px var(--shell-x);
  max-width: var(--maxw);
  margin: 0 auto;
  border-bottom: 1px solid var(--rule-soft);
  flex-wrap: wrap;
}
.nav-links {
  display: flex; gap: 28px; align-items: center;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink-2);
}
.nav-links a { transition: color 120ms; }
.nav-links a:hover { color: var(--ink); }
.nav-gh {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  color: var(--ink);
}
.nav-gh-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 25%, transparent);
}

/* ───────── HERO ───────── */
.hero {
  padding: clamp(48px, 8vw, 96px) var(--shell-x) clamp(48px, 7vw, 80px);
  max-width: var(--maxw);
  margin: 0 auto;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  gap: 72px;
  align-items: start;
}
.eyebrow {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-3);
  display: inline-flex; align-items: center; gap: 10px;
  letter-spacing: 0.02em;
}
.eyebrow .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 20%, transparent);
}
.hero-title {
  font-family: var(--mono);
  font-weight: 600;
  font-size: clamp(40px, 5.2vw, 72px);
  line-height: 1.02;
  letter-spacing: -0.035em;
  margin: 22px 0 24px;
  color: var(--ink);
  text-wrap: pretty;
}
.hero-title-accent {
  background: linear-gradient(to right,
    color-mix(in oklch, var(--accent) 25%, transparent),
    color-mix(in oklch, var(--accent) 25%, transparent));
  background-repeat: no-repeat;
  background-size: 100% 38%;
  background-position: 0 88%;
  padding: 0 4px;
}
.hero-sub {
  font-family: var(--sans);
  font-size: 18px;
  line-height: 1.55;
  color: var(--ink-2);
  max-width: 54ch;
  margin: 0 0 36px;
  text-wrap: pretty;
}

.hero-ctas { display: flex; align-items: center; gap: 20px; margin-bottom: 48px; flex-wrap: wrap; }
.hero-docs {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink);
  padding: 12px 4px;
  border-bottom: 1px solid var(--ink);
  transition: gap 180ms;
}
.hero-docs:hover { gap: 14px; }
.hero-docs .arrow { color: var(--accent-ink); }

.hero-meta {
  display: grid;
  grid-template-columns: repeat(4, auto);
  gap: 40px;
  border-top: 1px solid var(--rule-soft);
  padding-top: 24px;
  font-family: var(--mono);
}
.hero-meta > div { display: flex; flex-direction: column; gap: 6px; }
.hero-meta-k {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
}
.hero-meta-v { font-size: 14px; color: var(--ink); }

/* copy-row */
.copy-row {
  all: unset;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 12px;
  padding: 13px 16px 13px 14px;
  background: var(--bg-2);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink);
  transition: border-color 120ms, background 120ms;
  max-width: 100%;
}
.copy-row:hover { border-color: var(--ink-3); }
.copy-prefix { color: var(--accent-ink); user-select: none; }
.copy-cmd { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.copy-hint {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  padding: 3px 8px;
  border: 1px solid var(--rule);
  border-radius: 3px;
}

/* ascii annotation */
.ascii-wrap {
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  background: var(--bg-2);
  overflow: hidden;
  box-shadow: 0 1px 0 var(--rule-soft), 0 30px 60px -40px color-mix(in oklch, var(--ink) 40%, transparent);
}
.ascii-chrome {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--rule);
  background: var(--bg);
}
.cd { width: 10px; height: 10px; border-radius: 50%; background: var(--rule); display: inline-block; }
.ascii-chrome .cd:first-child { background: color-mix(in oklch, var(--accent) 60%, var(--rule)); }
.ascii-chrome-title {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-3);
}
.ascii-box {
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.55;
  color: var(--ink-2);
  margin: 0;
  padding: 22px 24px;
  white-space: pre;
  font-variant-ligatures: none;
  tab-size: 1;
  overflow-x: auto;
  display: block;
  width: fit-content;
  max-width: 100%;
}

.ascii-mobile {
  display: none;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.6;
  color: var(--ink-2);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 16px;
  background: var(--bg-2);
  width: 100%;
  box-sizing: border-box;
}
.ascii-mobile-header {
  color: var(--accent-ink);
  font-weight: 600;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--rule);
}
.ascii-mobile-score {
  color: var(--accent-ink);
  font-weight: 700;
}
.ascii-mobile-reason {
  color: var(--ink-2);
  margin-bottom: 12px;
  font-size: 11px;
}
.ascii-mobile-orig {
  color: var(--ink-3);
  font-size: 10px;
  margin-bottom: 6px;
}
.ascii-mobile-opt {
  color: var(--ink);
  font-size: 11px;
}
.ansi-yellow { color: var(--accent-ink); font-weight: 600; }
.ansi-dim    { color: var(--ink-3); }

/* ───────── SECTION HEADER ───────── */
section { padding: var(--pad-y) var(--shell-x); max-width: var(--maxw); margin: 0 auto; }
.sh { margin-bottom: 56px; max-width: 780px; }
.sh-kicker {
  font-family: var(--mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent-ink);
  margin-bottom: 20px;
}
.sh-title {
  font-family: var(--mono);
  font-weight: 600;
  font-size: clamp(28px, 3vw, 40px);
  line-height: 1.1;
  letter-spacing: -0.025em;
  margin: 0 0 16px;
  color: var(--ink);
  text-wrap: balance;
}
.sh-sub {
  font-family: var(--sans);
  font-size: 17px;
  line-height: 1.55;
  color: var(--ink-2);
  margin: 0;
  max-width: 62ch;
}

/* ───────── BEFORE/AFTER ───────── */
.ba-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 32px;
}
.ba-chip {
  all: unset;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-2);
  transition: all 120ms;
}
.ba-chip:hover { border-color: var(--ink-3); color: var(--ink); }
.ba-chip.on {
  background: var(--bg-2);
  border-color: var(--ink);
  color: var(--ink);
}
.ba-chip-num { color: var(--ink-3); }
.ba-chip-label { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ba-chip-score { font-weight: 600; }
.ba-chip-score.pos { color: var(--accent-ink); }
.ba-chip-score.neg { color: var(--ink-3); }

.ba-panes {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 0;
  align-items: stretch;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-2);
}
.ba-pane { padding: 28px 32px; display: flex; flex-direction: column; gap: 16px; }
.ba-pane + .ba-pane { border-left: 1px solid var(--rule); }
.ba-pane-head {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono);
}
.ba-pane-tag {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  padding: 4px 8px;
  border: 1px solid var(--rule);
  border-radius: 3px;
}
.ba-pane-tag.alt {
  color: var(--accent-ink);
  border-color: color-mix(in oklch, var(--accent) 40%, var(--rule));
  background: color-mix(in oklch, var(--accent) 10%, transparent);
}
.ba-pane-meta { font-size: 11px; color: var(--ink-3); text-transform: lowercase; letter-spacing: 0.04em; }
.ba-pane-text {
  font-family: var(--mono);
  font-size: 13.5px;
  line-height: 1.65;
  color: var(--ink);
  margin: 0;
  white-space: pre-wrap;
}
.ba-after-text { color: var(--ink); }
.ba-passthrough { color: var(--ink-2); }
.ba-passthrough-line { color: var(--ink-3); font-style: italic; }

.ba-arrow {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 0 8px;
  border-left: 1px solid var(--rule);
  border-right: 1px solid var(--rule);
  background: var(--bg);
  min-width: 120px;
}
.ba-arrow-line {
  flex: 1;
  width: 1px;
  background: linear-gradient(to bottom, transparent, var(--rule) 40%, var(--rule) 60%, transparent);
}
.ba-arrow-badge {
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 10px;
  border: 1px solid var(--ink);
  background: var(--bg);
  font-family: var(--mono);
  border-radius: var(--radius);
  margin: 12px 0;
}
.ba-arrow-num { font-size: 22px; font-weight: 600; color: var(--accent-ink); letter-spacing: -0.02em; }
.ba-arrow-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  margin-top: 4px;
}

.ba-reason {
  margin-top: 16px;
  padding: 14px 18px;
  border: 1px dashed var(--rule);
  border-radius: var(--radius);
  display: flex; gap: 14px; align-items: center;
  font-family: var(--mono);
  font-size: 12px;
}
.ba-reason-k {
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.ba-reason-v { color: var(--ink); }

/* ───────── HOW ───────── */
.how-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-2);
}
.how-step {
  padding: 32px;
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  display: flex; flex-direction: column; gap: 16px;
}
.how-step:nth-child(2n) { border-right: none; }
.how-step:nth-last-child(-n+2) { border-bottom: none; }
.how-step-head { display: flex; align-items: baseline; gap: 14px; font-family: var(--mono); }
.how-step-n {
  font-size: 13px;
  color: var(--accent-ink);
  letter-spacing: 0.08em;
}
.how-step-t {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--ink);
}
.how-step-d {
  font-family: var(--sans);
  font-size: 15.5px;
  line-height: 1.55;
  color: var(--ink-2);
  margin: 0;
  max-width: 52ch;
}
.how-step-code {
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.6;
  color: var(--ink);
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin: 8px 0 0;
  white-space: pre-wrap;
}

/* ───────── CLASSIFIER ───────── */
.cls-table {
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  font-family: var(--mono);
  font-size: 13px;
  background: var(--bg-2);
}
.cls-row {
  display: grid;
  grid-template-columns: 90px 120px 1fr;
  gap: 24px;
  padding: 14px 22px;
  border-bottom: 1px solid var(--rule-soft);
  align-items: center;
}
.cls-row:last-of-type { border-bottom: none; }
.cls-row.cls-head {
  background: var(--bg);
  border-bottom: 1px solid var(--rule);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  padding: 12px 22px;
}
.cls-score { font-weight: 600; font-variant-numeric: tabular-nums; }
.cls-score.pos { color: var(--accent-ink); }
.cls-score.neg { color: var(--ink-3); }
.cls-hit { display: inline-flex; align-items: center; gap: 8px; color: var(--ink-2); }
.cls-hit-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--rule); border: 1px solid var(--ink-3);
}
.cls-hit-dot.on {
  background: var(--accent);
  border-color: var(--accent-ink);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 20%, transparent);
}
.cls-prompt { color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cls-foot {
  padding: 14px 22px;
  background: var(--bg);
  border-top: 1px solid var(--rule);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.04em;
}

/* ───────── MEMORY ───────── */
.mem-panes {
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  gap: 48px;
  align-items: start;
}
.mem-term {
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  background: var(--bg-2);
  overflow: hidden;
}
.mem-term-head {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--rule);
}
.mem-term-title {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-3);
}
.mem-term-body {
  padding: 20px 22px;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.75;
  color: var(--ink);
}
.mem-prompt { color: var(--ink-3); }
.mem-prompt::before { content: "❯ "; color: var(--accent-ink); }
.mem-prompt { color: var(--ink); }
.mem-title-label { color: var(--ink); font-weight: 600; }
.mem-rule { color: var(--rule); letter-spacing: -1px; }
.mem-row {
  position: relative;
  padding: 4px 0;
  display: grid;
  grid-template-columns: 100px 130px 1fr auto;
  gap: 8px;
  align-items: center;
  font-variant-numeric: tabular-nums;
}
.mem-k { color: var(--ink-3); }
.mem-v { color: var(--accent-ink); }
.mem-c { color: var(--ink-2); }
.mem-s { color: var(--ink-3); font-size: 11.5px; }
.mem-bar {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 1px;
  background: color-mix(in oklch, var(--accent) 50%, transparent);
}

.mem-copy h3 {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 24px;
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin: 0 0 16px;
  color: var(--ink);
}
.mem-copy p {
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.6;
  color: var(--ink-2);
  margin: 0 0 24px;
}
.mem-bullets { display: flex; flex-direction: column; gap: 10px; }
.mem-bullet {
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.5;
  color: var(--ink-2);
}
.mem-bullet > span:first-child {
  color: var(--accent-ink);
  margin-right: 8px;
  font-weight: 600;
}
.mem-bullet code {
  background: var(--bg-2);
  padding: 1px 5px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  color: var(--ink);
}

/* ───────── ARCHITECTURE ───────── */
.arch-box {
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.7;
  color: var(--ink);
  background: var(--bg-2);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 28px 32px;
  margin: 0;
  white-space: pre;
  overflow-x: auto;
}
.arch-note {
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink-2);
  margin: 20px 0 0;
  max-width: 66ch;
}

/* ───────── COST ───────── */
.cost { padding-top: 0; }
.cost-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-2);
}
.cost-item {
  padding: 40px 32px;
  border-right: 1px solid var(--rule);
  display: flex; flex-direction: column; gap: 8px;
}
.cost-item:last-child { border-right: none; }
.cost-item.cost-emph { background: var(--bg); }
.cost-k {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-3);
}
.cost-v {
  font-family: var(--mono);
  font-size: 40px;
  font-weight: 600;
  letter-spacing: -0.03em;
  color: var(--ink);
  line-height: 1;
  margin: 6px 0 10px;
}
.cost-emph .cost-v { color: var(--accent-ink); }
.cost-d {
  font-family: var(--sans);
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.5;
}

/* ───────── INSTALL ───────── */
.inst-card {
  padding: 36px;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  background: var(--bg-2);
  display: flex; flex-direction: column; gap: 12px;
}
.inst-step {
  display: flex; align-items: baseline; gap: 14px;
  font-family: var(--mono);
  margin-top: 12px;
}
.inst-step:first-child { margin-top: 0; }
.inst-n { color: var(--accent-ink); font-size: 12px; letter-spacing: 0.08em; }
.inst-l { color: var(--ink); font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; }
.inst-foot {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px dashed var(--rule);
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-3);
}
.inst-foot code { color: var(--ink); background: var(--bg); padding: 1px 5px; border: 1px solid var(--rule); border-radius: 2px; }

/* ───────── FOOTER ───────── */
.foot {
  max-width: var(--maxw);
  margin: 80px auto 0;
  padding: 40px var(--shell-x);
  border-top: 1px solid var(--rule-soft);
}
.foot-top { display: flex; justify-content: space-between; align-items: center; }
.foot-links { display: flex; gap: 24px; font-family: var(--mono); font-size: 13px; color: var(--ink-2); }
.foot-links a:hover { color: var(--ink); }
.foot-rule { height: 1px; background: var(--rule-soft); margin: 24px 0; }
.foot-bot {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--ink-3);
}

/* ───────── RESPONSIVE ───────── */

@media (min-width: 1440px) {
  :root { --maxw: 1280px; --shell-x: 56px; }
}
@media (min-width: 1800px) {
  :root { --maxw: 1360px; }
}

@media (max-width: 1024px) {
  :root { --shell-x: 32px; --pad-y: 96px; }
  .hero-grid { gap: 48px; }
  .hero-title { font-size: clamp(36px, 6vw, 56px); }
  .hero-meta { gap: 28px; }
  .how-grid { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 820px) {
  :root { --shell-x: 24px; --pad-y: 72px; }

  .nav { padding: 18px var(--shell-x); }
  .nav-links { gap: 18px; font-size: 12.5px; flex-wrap: wrap; justify-content: flex-end; }

  .hero { padding: 48px var(--shell-x) 56px; }
  .hero-grid { grid-template-columns: 1fr; gap: 40px; }
  .hero-title { font-size: clamp(32px, 7.5vw, 48px); }
  .hero-sub { font-size: 16px; }
  .hero-meta { grid-template-columns: repeat(2, 1fr); gap: 20px 24px; }
  .hero-ctas { gap: 14px; }

  .sh { margin-bottom: 40px; }
  .sh-title { font-size: clamp(24px, 4.4vw, 32px); }
  .sh-sub { font-size: 15.5px; }

  .ba-panes { grid-template-columns: 1fr; }
  .ba-pane + .ba-pane { border-left: none; border-top: 1px solid var(--rule); }
  .ba-pane { padding: 22px 20px; }
  .ba-arrow {
    flex-direction: row; min-width: 0; padding: 10px 14px;
    border-left: none; border-right: none;
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
  }
  .ba-arrow-line { width: auto; height: 1px; flex: 1; background: linear-gradient(to right, transparent, var(--rule) 40%, var(--rule) 60%, transparent); }
  .ba-arrow-badge { margin: 0 12px; padding: 8px 14px; flex-direction: row; gap: 12px; }
  .ba-arrow-num { font-size: 18px; }

  .ba-chip-label { max-width: 180px; }

  .how-grid { grid-template-columns: 1fr; }
  .how-step { border-right: none; border-bottom: 1px solid var(--rule); padding: 26px 22px; }
  .how-step:last-child { border-bottom: none; }

  .mem-panes { grid-template-columns: 1fr; gap: 28px; }
  .mem-row { grid-template-columns: 90px 110px 1fr; font-size: 12px; gap: 10px; }
  .mem-s { display: none; }
  .mem-copy h3 { font-size: 20px; }

  .cost-grid { grid-template-columns: 1fr; }
  .cost-item { border-right: none; border-bottom: 1px solid var(--rule); padding: 28px 24px; }
  .cost-item:last-child { border-bottom: none; }
  .cost-v { font-size: 34px; }

  .inst-card { padding: 24px 20px; }

  .foot { margin-top: 40px; padding: 32px var(--shell-x); }
  .foot-top { flex-direction: column; align-items: flex-start; gap: 16px; }
  .foot-bot { flex-direction: column; align-items: flex-start; gap: 8px; }
  .foot-links { flex-wrap: wrap; gap: 16px; }
}

@media (max-width: 560px) {
  :root { --shell-x: 18px; --pad-y: 60px; }

  .mem-term-body { padding: 16px 16px; font-size: 11.5px; line-height: 1.65; }
  .arch-box { font-size: 11px; padding: 20px 16px; line-height: 1.55; }
  .how-step-code { font-size: 11.5px; padding: 12px 14px; }

  .cls-table { font-size: 12px; }
  .cls-row.cls-head { display: none; }
  .cls-row {
    grid-template-columns: auto auto;
    grid-template-areas:
      "score hit"
      "prompt prompt";
    gap: 6px 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .cls-score  { grid-area: score; }
  .cls-hit    { grid-area: hit; justify-self: end; }
  .cls-prompt { grid-area: prompt; white-space: normal; line-height: 1.5; color: var(--ink-2); }
  .cls-foot { padding: 14px 16px; font-size: 10.5px; }

  .mem-row { grid-template-columns: 84px 1fr; row-gap: 2px; }
  .mem-c, .mem-s { grid-column: 1 / -1; font-size: 11px; }

  .nav { padding: 14px var(--shell-x); }
  .nav-links { gap: 14px; }
  .nav-links a:not(.nav-gh) { display: none; }
  .nav-gh { padding: 5px 10px; font-size: 12px; }

  .hero { padding: 36px var(--shell-x) 44px; }
  .hero-title { font-size: clamp(30px, 9vw, 40px); line-height: 1.05; }
  .hero-sub { font-size: 15px; }
  .hero-meta { grid-template-columns: 1fr 1fr; gap: 18px 20px; padding-top: 20px; }
  .hero-docs { font-size: 12px; }

  .copy-row { font-size: 11.5px; padding: 11px 12px; gap: 10px; }
  .copy-hint { display: none; }

  .ba-pane-text { font-size: 12.5px; line-height: 1.6; }
  .ba-chip { padding: 8px 12px; font-size: 11.5px; }
  .ba-chip-label { max-width: 140px; }

  .cost-k { font-size: 10.5px; }
  .cost-v { font-size: 30px; }
  .cost-d { font-size: 13px; }

  .ascii-chrome, .mem-term-head { padding: 8px 12px; }
}

@media (max-width: 380px) {
  :root { --shell-x: 14px; }
  .hero-title { font-size: 28px; }
  .hero-meta { grid-template-columns: 1fr; gap: 14px; }
  .ba-chip-label { display: none; }
  .arch-box { font-size: 10px; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; }
}

/* ───────── MOBILE RESPONSIVE ───────── */
@media (max-width: 768px) {
  :root {
    --shell-x: 20px;
    --pad-y: 60px;
  }

  /* Nav */
  .nav {
    padding: 16px var(--shell-x);
    gap: 12px;
  }
  .nav-links {
    gap: 16px;
    font-size: 12px;
    flex-wrap: wrap;
  }

  /* Hero */
  .hero-grid {
    grid-template-columns: 1fr;
    gap: 40px;
  }
  .hero-title {
    font-size: clamp(32px, 8vw, 48px);
  }
  .hero-sub {
    font-size: 16px;
  }
  .hero-meta {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 16px;
  }
  .hero-ctas {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }

  /* All 2-col grids collapse to 1 col */
  .two-col,
  .before-after-grid,
  .install-grid,
  .cost-strip,
  .memory-grid,
  .arch-grid,
  .how-grid {
    grid-template-columns: 1fr !important;
    gap: 24px;
  }

  /* Classifier table — allow horizontal scroll */
  .classifier-table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* Section padding */
  section, .section {
    padding-top: 60px !important;
    padding-bottom: 60px !important;
  }

  /* Typography scale down */
  h2, .section-title {
    font-size: clamp(24px, 6vw, 36px) !important;
  }

  /* Terminal/annotation boxes */
  .annotation-box,
  .terminal-box,
  pre {
    font-size: 11px !important;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* Before/after chips — wrap */
  .chip-row,
  .example-chips {
    flex-wrap: wrap;
    gap: 6px;
  }

  /* Install steps */
  .install-step {
    padding: 16px !important;
  }

  /* Footer */
  footer, .footer {
    flex-direction: column !important;
    gap: 24px;
    text-align: center;
  }
  .footer-links {
    justify-content: center !important;
    flex-wrap: wrap;
    gap: 16px;
  }

  /* ASCII annotation box — hide on mobile, show CSS card instead */
  .ascii-wrap {
    overflow: hidden;
    width: 100%;
    max-width: 100%;
  }
  .ascii-box {
    display: none !important;
  }
  .ascii-mobile {
    display: block !important;
  }

  /* Hero right column — must not clip its child */
  .hero-right {
    width: 100% !important;
    max-width: 100% !important;
    overflow-x: auto !important;
    overflow-y: visible !important;
  }

  /* Hero — prevent any child from escaping viewport */
  .hero,
  .hero-grid,
  .hero-left,
  .hero-right {
    width: 100% !important;
    max-width: 100% !important;
    min-width: 0 !important;
  }
  .hero * {
    max-width: 100% !important;
    min-width: 0 !important;
  }

  /* Code/cmd blocks inside hero */
  .hero code,
  .hero pre,
  .hero .copy-row {
    overflow-x: auto !important;
    max-width: 100% !important;
    font-size: 12px !important;
  }
}

@media (max-width: 480px) {
  :root { --shell-x: 16px; }

  .hero-title {
    font-size: clamp(28px, 9vw, 40px);
  }

  .nav-links a:not(:first-child):not(:last-child) {
    display: none;
  }

  .hero-meta {
    grid-template-columns: repeat(2, 1fr) !important;
  }

  .annotation-box,
  .terminal-box,
  pre {
    font-size: 10px !important;
  }
}

/* ── Demo widget ── */
.demo-widget {
  margin-top: 28px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--paper);
  overflow: hidden;
}
.demo-widget-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.demo-widget-header .demo-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
}
.demo-input-row {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
}
.demo-textarea {
  flex: 1;
  resize: none;
  border: none;
  outline: none;
  padding: 12px 14px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.5;
  background: transparent;
  color: var(--ink);
  min-height: 72px;
  max-height: 120px;
}
.demo-textarea::placeholder { color: var(--ink-2); opacity: 0.7; }
.demo-btn {
  flex-shrink: 0;
  align-self: flex-end;
  margin: 10px 10px 10px 0;
  padding: 8px 16px;
  background: var(--accent-ink);
  color: var(--accent);
  border: none;
  border-radius: 5px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s;
}
.demo-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.demo-btn:hover:not(:disabled) { opacity: 0.85; }
.demo-result {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-top: 1px solid var(--border);
  font-size: 12px;
}
.demo-result-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.demo-result-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-2);
}
.demo-result-text {
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.5;
  color: var(--ink);
  padding: 8px 10px;
  border-radius: 4px;
  background: rgba(0,0,0,0.03);
  white-space: pre-wrap;
  word-break: break-word;
}
.demo-result-text.optimized {
  background: rgba(196, 154, 60, 0.08);
  border-left: 3px solid var(--accent);
}
.demo-meta-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.demo-badge {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 7px;
  border-radius: 3px;
}
.demo-badge-pass    { background: #e0e0e0; color: #444; }
.demo-badge-enrich  { background: rgba(196,154,60,0.18); color: #7a5a10; }
.demo-badge-clarify { background: rgba(220,120,20,0.15); color: #8a4a00; }
.demo-reason {
  font-size: 11px;
  color: var(--ink-2);
  font-style: italic;
  flex: 1;
}
.demo-tries {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-2);
  padding: 8px 14px;

}
.demo-limit-msg {
  padding: 14px;
  font-size: 13px;
  color: var(--ink);
  text-align: center;
  border-top: 1px solid var(--border);
}
.demo-limit-msg a {
  color: var(--accent-ink);
  font-weight: 600;
  text-decoration: none;
}
.demo-limit-msg a:hover { text-decoration: underline; }
.demo-error {
  padding: 10px 14px;
  font-size: 12px;
  color: #9e3a3a;
  border-top: 1px solid var(--border);

}

/* ── Auth Modal ── */
.auth-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.auth-modal {
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 2px;
  width: 100%;
  max-width: 400px;
  position: relative;
  font-family: var(--mono);
}
.auth-modal-header { padding: 24px 24px 0; }
.auth-modal-close {
  all: unset;
  cursor: pointer;
  position: absolute;
  top: 16px; right: 16px;
  font-size: 18px;
  color: var(--ink-3);
  line-height: 1;
  padding: 4px 6px;
}
.auth-modal-close:hover { color: var(--ink); }
.auth-modal-title { font-size: 18px; font-weight: 700; color: var(--ink); margin: 0 0 6px; }
.auth-modal-sub {
  font-size: 12px;
  color: var(--ink-3);
  margin: 0 0 20px;
  font-family: var(--sans);
}
.auth-tabs {
  display: flex;
  border-bottom: 1px solid var(--rule);
  padding: 0 24px;
}
.auth-tab {
  all: unset;
  cursor: pointer;
  padding: 10px 0;
  margin-right: 24px;
  font-size: 13px;
  color: var(--ink-3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.auth-tab.active { color: var(--ink); border-bottom-color: var(--accent); }
.auth-form {
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.auth-input {
  all: unset;
  box-sizing: border-box;
  width: 100%;
  padding: 10px 12px;
  font-family: var(--mono);
  font-size: 13px;
  background: var(--bg-2);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  color: var(--ink);
}
.auth-input:focus { border-color: var(--accent); outline: none; }
.auth-btn-submit {
  all: unset;
  cursor: pointer;
  width: 100%;
  padding: 12px;
  background: var(--ink);
  color: var(--bg);
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  border-radius: var(--radius);
  margin-top: 4px;
  box-sizing: border-box;
}
.auth-btn-submit:hover { opacity: 0.85; }
.auth-btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

                strokeLinecap="square" strokeLinejoin="miter" fill="none" />
        </svg>

    /* ── Copy button ── */
    function CopyRow({ cmd, prefix = '$' }) {
      const [copied, setCopied] = useState(false);
      return (
        <button className="copy-row"
          onClick={() => {
            navigator.clipboard?.writeText(cmd);
            setCopied(true);
            setTimeout(() => setCopied(false), 1400);
          }}
          aria-label="copy command">
          <span className="copy-prefix">{prefix}</span>
          <span className="copy-cmd">{cmd}</span>
          <span className="copy-hint">{copied ? 'copied' : 'copy'}</span>
        </button>
      );
    }

        const params = new URLSearchParams(window.location.search);

              setEmail(data.email);
              setStatus('success');

          <div style={{maxWidth:'520px',width:'100%'}}>

              <p style={{fontSize:'13px',color:'#6b6560',marginBottom:'40px'}}>

                <div style={{fontSize:'11px',letterSpacing:'0.08em',textTransform:'uppercase',
                             color:'#6b6560',marginBottom:'12px'}}>Get started now</div>
                {['pip install preprompt','preprompt-install'].map(cmd => (
                  <div key={cmd} style={{background:'#2a2520',color:'#f7f3ee',borderRadius:'5px',

                    $ {cmd}
                  </div>
                ))}
              </div>
              <div style={{border:'1px solid #ddd8d0',borderRadius:'8px',padding:'20px 24px'}}>
                <div style={{fontSize:'11px',letterSpacing:'0.08em',textTransform:'uppercase',
                             color:'#6b6560',marginBottom:'12px'}}>Your dashboard</div>
                <a href="https://preprompt.org" style={{color:'#c49a3c',fontWeight:600,
                                                        textDecoration:'none',fontSize:'14px'}}>
                  preprompt.org →

    /* ── Auth Modal ── */
    function AuthModal({ onClose, onAuthSuccess }) {
      const [tab, setTab] = React.useState('signup');
      const [email, setEmail] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [confirm, setConfirm] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const [err, setErr] = React.useState('');
      const [signupDone, setSignupDone] = React.useState(false);
      const [showResend, setShowResend] = React.useState(false);
      const [resendMsg, setResendMsg] = React.useState('');

      React.useEffect(() => {
        function onKey(e) { if (e.key === 'Escape') onClose(); }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);

      async function handleSignUp(e) {
        e.preventDefault();
        if (password !== confirm) { setErr('Passwords do not match.'); return; }
        if (password.length < 8) { setErr('Password must be at least 8 characters.'); return; }
        setErr(''); setLoading(true);
        try {
          const { data, error } = await supabase.auth.signUp({ email, password });
          if (error) { setErr(error.message); return; }
          const user = data.user;
          if (user) {
            const { error: profileError } = await supabase.from('user_profiles').upsert({
              id: user.id, email: user.email, demo_tries_used: 0,
            });
            if (profileError) console.error('Profile upsert failed:', profileError);
          }
          setSignupDone(true);
        } catch (ex) {
          setErr('Sign up failed. Please try again.');
        } finally {
          setLoading(false);
        }
      }

      async function handleLogin(e) {
        e.preventDefault();
        setErr(''); setShowResend(false); setResendMsg(''); setLoading(true);
        try {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) {
            if (error.message.includes('Email not confirmed')) {
              setErr('Please check your email and click the confirmation link first.');
              setShowResend(true);
            } else {
              setErr(error.message);
            }
            return;
          }
          onAuthSuccess(data.session);
        } catch (ex) {
          setErr('Login failed. Please try again.');
        } finally {
          setLoading(false);
        }
      }

      async function handleResendConfirmation() {
        setResendMsg('');
        try {
          await supabase.auth.resend({ type: 'signup', email });
          setResendMsg('Confirmation email sent. Check your inbox.');
        } catch (ex) {
          setResendMsg('Could not resend. Please try again.');
        }
      }

      if (signupDone) {
        return (
          <div className="auth-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
            <div className="auth-modal" role="dialog" aria-modal="true">
              <button className="auth-modal-close" onClick={onClose} aria-label="close">×</button>
              <div className="auth-form" style={{textAlign: 'center', paddingTop: '36px', paddingBottom: '36px'}}>
                <div style={{fontSize: '28px', marginBottom: '12px', color: 'var(--accent-ink)'}}>✓</div>
                <div style={{fontFamily: 'var(--mono)', fontWeight: 700, fontSize: '16px', color: 'var(--ink)', marginBottom: '10px'}}>
                  Account created!
                </div>
                <div style={{fontSize: '13px', color: 'var(--ink-2)', fontFamily: 'var(--sans)', lineHeight: 1.6}}>
                  Check <strong>{email}</strong> for a confirmation link.<br />
                  After confirming, return here to try PrePrompt.
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="auth-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="auth-modal" role="dialog" aria-modal="true">
            <button className="auth-modal-close" onClick={onClose} aria-label="close">×</button>
            <div className="auth-modal-header">
              <div className="auth-modal-title">Try PrePrompt</div>
              <div className="auth-modal-sub">Create a free account to optimize your first prompt</div>
            </div>
            <div className="auth-tabs">
              <button className={`auth-tab${tab === 'signup' ? ' active' : ''}`} onClick={() => { setTab('signup'); setErr(''); setShowResend(false); setResendMsg(''); }}>Sign Up</button>
              <button className={`auth-tab${tab === 'login' ? ' active' : ''}`} onClick={() => { setTab('login'); setErr(''); setShowResend(false); setResendMsg(''); }}>Log In</button>
            </div>
            {tab === 'signup' ? (
              <form className="auth-form" onSubmit={handleSignUp}>
                <input className="auth-input" type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} required autoFocus />
                <input className="auth-input" type="password" placeholder="Password (min 8 chars)" value={password} onChange={e => setPassword(e.target.value)} required />
                <input className="auth-input" type="password" placeholder="Confirm password" value={confirm} onChange={e => setConfirm(e.target.value)} required />
                {err && <div className="auth-err">{err}</div>}
                <button className="auth-btn-submit" type="submit" disabled={loading}>{loading ? 'Creating account…' : 'Create Account'}</button>
              </form>
            ) : (
              <form className="auth-form" onSubmit={handleLogin}>
                <input className="auth-input" type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} required autoFocus />
                <input className="auth-input" type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} required />
                {err && <div className="auth-err">{err}</div>}
                {showResend && (
                  <button type="button" className="auth-resend-btn" onClick={handleResendConfirmation}>
                    Resend confirmation email
                  </button>
                )}
                {resendMsg && <div className="auth-resend-msg">{resendMsg}</div>}
                <button className="auth-btn-submit" type="submit" disabled={loading}>{loading ? 'Logging in…' : 'Log In'}</button>
              </form>
            )}
          </div>
        </div>
      );
    }

    function DemoWidget({ onSignOut }) {
      const [prompt, setPrompt] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const [result, setResult] = React.useState(null);
      const [error, setError] = React.useState(null);
      const [user, setUser] = React.useState(null);
      const [showAuthModal, setShowAuthModal] = React.useState(false);
      const [triesUsed, setTriesUsed] = React.useState(0);
      const [isAdmin, setIsAdmin] = React.useState(false);
      const [pendingCheckout, setPendingCheckout] = React.useState(null);

      React.useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          if (session?.user) {
            setUser(session.user);
            loadTriesUsed(session.user.id);
          }
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange(
          async (event, session) => {
            if (event === 'SIGNED_IN' && session) {
              setUser(session.user);
              await loadTriesUsed(session.user.id);
              setShowAuthModal(false);
            } else if (event === 'SIGNED_OUT') {
              setUser(null);
              setTriesUsed(0);
              setIsAdmin(false);
            }
          }
        );
        return () => subscription.unsubscribe();
      }, []);

      async function loadTriesUsed(userId) {
        const { data } = await supabase
          .from('user_profiles')
          .select('demo_tries_used, plan')
          .eq('id', userId)
          .single();
        if (data) {
          if (data.plan === 'admin') {
            setTriesUsed(0);
            setIsAdmin(true);
          } else {
            setTriesUsed(data.demo_tries_used || 0);
            setIsAdmin(false);
          }
        }
        return data?.demo_tries_used || 0;
      }

      async function runOptimize(session, currentTriesUsed) {
        console.log('runOptimize called', {user: !!user, prompt, triesUsed});
        if (!prompt.trim() || loading) return;
        setLoading(true);
        setResult(null);
        setError(null);
        try {
          const headers = { 'Content-Type': 'application/json' };
          const token = session?.access_token;
          if (token) headers['Authorization'] = `Bearer ${token}`;
          const res = await fetch(DEMO_API, {
            method: 'POST',
            headers,
            body: JSON.stringify({ prompt: prompt.trim() }),
          });
          if (res.status === 429) {
            setTriesUsed(2);
            return;
          }
          if (!res.ok) {
            setError('Something went wrong. Try again.');
            return;
          }
          const data = await res.json();
          setResult(data);
          if (session?.user?.id && !isAdmin) {
            const newTriesUsed = currentTriesUsed + 1;
            setTriesUsed(newTriesUsed);
            await supabase.from('user_profiles')
              .update({ demo_tries_used: newTriesUsed })
              .eq('id', session.user.id);
          }
        } catch (e) {
          setError('Something went wrong. Try again.');
        } finally {
          setLoading(false);
        }
      }

      async function handleOptimize() {
        if (!prompt.trim() || loading) return;
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
          setShowAuthModal(true);
          return;
        }
        if (!isAdmin && triesUsed >= 2) return;
        await runOptimize(session, triesUsed);
      }

      async function handleAuthSuccess(session) {
        setShowAuthModal(false);
        setUser(session?.user || null);
        let currentTriesUsed = 0;
        let adminUser = false;
        if (session?.user) {
          const { data } = await supabase
            .from('user_profiles')
            .select('demo_tries_used, plan')
            .eq('id', session.user.id)
            .single();
          adminUser = data?.plan === 'admin';
          currentTriesUsed = adminUser ? 0 : (data?.demo_tries_used || 0);
          setIsAdmin(adminUser);
          setTriesUsed(currentTriesUsed);
        }
        if (pendingCheckout) {
          const checkoutPlan = pendingCheckout;
          setPendingCheckout(null);
          const res = await fetch(`${BACKEND}/api/create-checkout-session`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({plan: checkoutPlan, user_id: session.user.id, email: session.user.email}),
          });
          const checkoutData = await res.json();
          if (checkoutData.checkout_url) window.location.href = checkoutData.checkout_url;
          return;
        }
        if (adminUser || currentTriesUsed < 2) {
          await runOptimize(session, currentTriesUsed);
        }
      }

      async function handleSignOut() {
        setUser(null);
        setTriesUsed(0);
        setIsAdmin(false);
        Object.keys(localStorage).forEach(k => {
          if (k.startsWith('sb-') || k.includes('supabase')) localStorage.removeItem(k);
        });
        if (onSignOut) await onSignOut();
        else await supabase.auth.signOut({ scope: 'local' });
      }

      async function handleCheckout(plan) {
        if (!user) {
          setPendingCheckout(plan);
          setShowAuthModal(true);
          return;
        }
        try {
          const res = await fetch(`${BACKEND}/api/create-checkout-session`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({plan, user_id: user.id, email: user.email}),
          });
          const data = await res.json();
          if (data.checkout_url) {
            sessionStorage.setItem('preprompt_checkout_plan', plan);
            window.location.href = data.checkout_url;
          }
        } catch (e) {
          console.error('Checkout error:', e);
        }
      }

      function handleKey(e) {
        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) handleOptimize();
      }

      const limitReached = user && !isAdmin && triesUsed >= 2;
      const badgeClass = result
        ? result.route === 'pass' ? 'demo-badge-pass'
          : result.route === 'clarify' ? 'demo-badge-clarify'
          : 'demo-badge-enrich'
        : '';

      return (
        <>
          {showAuthModal && (
            <AuthModal onClose={() => setShowAuthModal(false)} onAuthSuccess={handleAuthSuccess} />
          )}
          <div className="demo-widget">
            <div className="demo-widget-header">
              <span className="demo-dot" />
              try it live
            </div>
            {user && (
              <div className="demo-user-bar">
                Signed in as {user.email}
                {isAdmin
                  ? <>{' '}<span className="demo-admin-badge">ADMIN</span>{' · '}</>
                  : (!limitReached && ` · ${2 - triesUsed} tr${(2 - triesUsed) === 1 ? 'y' : 'ies'} remaining · `)
                }
                <button className="demo-signout-btn" onClick={handleSignOut}>Sign out</button>
              </div>
            )}
            <div className="demo-input-row">
              <textarea
                className="demo-textarea"
                placeholder="Paste any prompt and see PrePrompt optimize it..."
                value={prompt}
                onChange={e => setPrompt(e.target.value)}
                onKeyDown={handleKey}
                rows={3}
              />
              {!limitReached && (
                <button
                  className="demo-btn"
                  onClick={handleOptimize}
                  disabled={loading || !prompt.trim()}
                >
                  {loading ? 'Optimizing…' : 'Optimize →'}
                </button>
              )}
            </div>

            {result && (
              <div className="demo-result">
                <div className="demo-result-row">
                  <span className="demo-result-label">Original</span>
                  <div className="demo-result-text">{result.original}</div>
                </div>
                <div className="demo-result-row">
                  <span className="demo-result-label">Optimized</span>
                  <div className={`demo-result-text${result.was_optimized ? ' optimized' : ''}`}>
                    {result.optimized}
                  </div>
                </div>

    /* ── App ── */
    function App() {
      const [appAuthModal, setAppAuthModal] = React.useState(false);
      const [appPendingCheckout, setAppPendingCheckout] = React.useState(null);

      React.useEffect(() => {
        const hash = window.location.hash;
        if (hash && hash.includes('access_token')) {
          supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
              window.history.replaceState(null, '', window.location.pathname);
            }
          });
        }
      }, []);

      const handleSignOut = async () => {
        Object.keys(localStorage).forEach(k => {
          if (k.startsWith('sb-') || k.includes('supabase')) localStorage.removeItem(k);
        });
        await supabase.auth.signOut({ scope: 'local' });
      };

      async function handleCheckout(plan) {
        console.log('handleCheckout called', plan);
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
          setAppPendingCheckout(plan);
          setAppAuthModal(true);
          return;
        }
        try {
          const res = await fetch(`${BACKEND}/api/create-checkout-session`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({plan, user_id: session.user.id, email: session.user.email}),
          });
          const data = await res.json();
          if (data.checkout_url) {
            sessionStorage.setItem('preprompt_checkout_plan', plan);
            window.location.href = data.checkout_url;
          }
        } catch (e) {
          console.error('Checkout error:', e);
        }
      }

      async function handleAppAuthSuccess(session) {
        setAppAuthModal(false);
        if (appPendingCheckout && session?.user) {
          const plan = appPendingCheckout;
          setAppPendingCheckout(null);
          const res = await fetch(`${BACKEND}/api/create-checkout-session`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({plan, user_id: session.user.id, email: session.user.email}),
          });
          const data = await res.json();
          if (data.checkout_url) window.location.href = data.checkout_url;
        }
      }

      return (
        <>
          {appAuthModal && (
            <AuthModal onClose={() => setAppAuthModal(false)} onAuthSuccess={handleAppAuthSuccess} />
          )}
          <Nav />
          <Hero onSignOut={handleSignOut} />
          <SocialProof />
          <BeforeAfter />
          <HowItWorks />
          <ClassifierTable />
          <StackMemory />
          <Architecture />
          <Cost />
          <Install />
          <FAQ />
          <Pricing onCheckout={handleCheckout} />
          <Beta />
          <Footer />
        </>
      );
    }

    function appendEmail() {
      const email = document.getElementById('email-input')?.value?.trim();
      const btn = document.getElementById('beta-join-btn');
      if (email && btn) {
        btn.href = 'https://preprompt.beehiiv.com/subscribe?email=' + encodeURIComponent(email);
      }
    }

    const isSuccessPage = window.location.pathname === '/success' || window.location.pathname === '/success.html';
    ReactDOM.createRoot(document.getElementById('app')).render(isSuccessPage ? <SuccessPage /> : <App />);
  </script>
